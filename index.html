<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科研周报系统 - 遥感科学与技术</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f5f7 0%, #eaeaec 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #0071e3;
            --accent-bg: rgba(0, 113, 227, 0.08); 
            --sidebar-hover: rgba(0, 0, 0, 0.04);
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a1a1a6; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background: var(--bg-gradient);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .sidebar {
            width: 240px; 
            background-color: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-right: 1px solid rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header { padding: 35px 20px 25px; text-align: center; }
        .sidebar-header h2 { margin: 0 0 6px 0; font-size: 1.15rem; font-weight: 600; }
        .sidebar-header p { margin: 0; font-size: 0.75rem; color: var(--text-secondary); font-weight: 500; }

        .date-list { list-style: none; padding: 0 12px; margin: 0; overflow-y: auto; }
        .date-item {
            padding: 12px 16px;
            margin-bottom: 6px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.25s ease;
            font-size: 0.9rem;
            color: var(--text-primary);
            font-weight: 500;
            text-align: center;
        }
        .date-item:hover { background-color: var(--sidebar-hover); }
        .date-item.active { background-color: var(--accent-bg); color: var(--accent-color); font-weight: 600; }

        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .report-card {
            background: var(--card-bg);
            padding: 50px 70px; 
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
            max-width: 850px;
            margin: 0 auto;
            min-height: calc(100% - 100px);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-content { animation: fadeIn 0.4s ease forwards; }

        .report-header { border-bottom: 1px solid rgba(0, 0, 0, 0.06); padding-bottom: 24px; margin-bottom: 40px; }
        .report-header h1 { margin: 0 0 10px 0; font-size: 2.2rem; font-weight: 700; }
        .report-meta { color: var(--text-secondary); font-size: 0.95rem; }

        .section-title {
            color: var(--text-primary); font-size: 1.1rem; font-weight: 600;
            margin-top: 35px; margin-bottom: 15px;
            display: flex; align-items: center;
        }
        .section-title::before {
            content: ""; display: inline-block; width: 4px; height: 16px;
            background-color: var(--accent-color); border-radius: 2px; margin-right: 12px;
        }

        .section-content {
            line-height: 1.8; color: #333336; background: #fcfcfd;
            padding: 24px 28px; border-radius: 14px; font-size: 0.98rem;
            border: 1px solid rgba(0, 0, 0, 0.03);
            white-space: pre-line; /* 保持输入时的换行效果 */
        }
        b { color: var(--accent-color); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>科研周报系统</h2>
            <p>遥感与信息工程学院</p>
        </div>
        <ul class="date-list" id="dateList"></ul>
    </aside>

    <main class="main-content">
        <div class="report-card" id="reportCard"></div>
    </main>

    <script>
        /**
         * 💡 在这里直接输入内容！
         * 使用反引号 ` 包裹内容，可以直接按回车换行。
         */
        const reportData = [
            {
                date: '3/09 -- 3/15',
                summary: `本周核心工作聚焦于商业遥感卫星（吉林一号 KF01/KF02 系列）影像质量的自动化评估。
                共完成39景影像的批量处理与数据分析。`,
                progress: `1. **算法重构**：重构了 Python 自动化评估脚本中的核心几何算法，引入背景值过滤。
                2. **性能评估**：确认 KF02 系列幅宽稳定在 15.2km 以上，优于标准。
                3. **分辨率校正**：基于 XML 元数据侧摆角实现了星下点投影校正。`,
                issues: `发现沙漠区域 L1 级影像的分辨率略微超出 0.5m 阈值，需进一步分析。`,
                plan: `1. 优化自动化评估脚本。
                2. 分析 KF02 系列在不同地表条件下的成像表现。`
            },
            {
                date: '3/16 -- 3/22',
                summary: `本周主要研读了武汉大学张良培教授等撰写的综述文献《数据驱动的多源遥感信息融合研究进展》。
                重点梳理了融合算法从传统的模型驱动向数据驱动演进的技术脉络。`,
                progress: `1. **理论梳理**：总结了成分替换（CS）和多分辨率分析（MRA）在空间与光谱保真度上的权衡关系。
                2. **瓶颈分析**：明确了纯数据驱动算法在定量遥感任务中存在的物理可解释性弱、泛化能力差的问题。
                3. **创新点寻找**：确立了将物理退化机制（如 MTF/SRF）作为正则化约束融入网络训练的思路。`,
                issues: `物理机制的数学表达：如何将具体的传感器物理响应函数转化为深度学习可微的损失函数仍需推导。`,
                plan: `继续推导物理约束项的数学形式。`
            },
            {
                date: '3/23 -- 3/29',
                summary: `本周主要任务是完成吉林一号 KF02 系列影像在沙漠区域的质量异常分析，并开始撰写多源数据融合算法的实验方案。`,
                progress: `1. **质量分析**：针对沙漠区 L1 级影像分辨率超标问题，通过对比大气校正前后的像元值分布，初步判定为高反射背景导致的晕影效应影响了边缘检测精度。
                2. **环境配置**：在服务器上搭建了基于 PyTorch 的深度学习遥感图像处理框架，成功运行了基础的残差网络。
                3. **数据预处理**：完成了 10 景 Sentinel-2 数据与 KF01 影像的配准工作，RMSE 控制在 0.5 个像元以内。`,
                issues: `1. 沙漠区域的 MTF 计算受低对比度特征点影响，现有的自动选取样本点算法成功率较低，需要人工干预。
                2. 服务器显存限制，处理整景大尺寸影像时存在 OOM 报错。`,
                plan: `1. 优化样本点自动筛选算法，引入纹理特征过滤。
                2. 尝试将大影像进行分块（Tiling）处理。
                3. 深入研读 2 篇关于“物理约束深度学习”的最新论文。`
            },
            {
                date: '3/30 -- 4/05',
                summary: `本周主要完成了《2026年白洋淀流域及水源地遥感分析项目》技术文档的深度解析，初步确定了毕业论文的大致方向，并完成了相关核心文献的初步调研。`,
                progress: `1. **项目需求解析**：梳理了项目在白洋淀淀区（0.5m/2m）、上游流域（2m）及全省水源地（0.8m）三个空间层级的技术要求，明确了核心任务。
                            2. **文献调研与大纲拟定**：针对淀区水生植物、黑臭水体及面源污染查阅了近20篇核心期刊文献，初步拟定了基于多源高分遥感的时空演变及污染识别大纲，并完成了组会汇报PPT话术的撰写。
                            3. **关键概念梳理**：明确了工程应用中“历史台账”（先验问题数据库）的空间比对作用，以及“高程数据”（DEM）在水文汇水分析与岸线侵蚀评价中的具体应用场景。`,
                issues: `1. 初步拟定的研究大纲（包含水体面积、植物分类、污染识别）内容过于宽泛，工作量过大，缺乏足够的深度。
                        2. 研究方向未能精准切中地方环保部门（雄安环保局/河北环保厅）常态化执法的实际痛点，作为项目合作“敲门砖”的价值不足。`,
                plan: `1. 根据导师建议，全面缩减大论文的广度，寻找具备深钻价值和实际业务支撑点的细分方向。
                        2. 收集环保部门近期官方通报、招标流向及水质实测数据，挖掘其实际业务需求。`
            },
            {
                date: '4/06 -- 4/12',
                summary: `本周全面调整并确立了“淀边微小黑臭水体精细化识别”的研究方向，重点完成了开题大纲的重写、先导实验区的高分数据预处理，并初步开展了黑臭水体光谱特征的提取实验。`,
                progress: `1. **开题报告与大纲撰写**：彻底重构了论文大纲，完成了《绪论》和《研究区与数据源》前两章初稿的文字撰写（约3000字），并制作了用于下周组会汇报的PPT技术路线图。
                            2. **先导区影像预处理**：利用 ENVI 软件完成了该区域影像的辐射定标、大气校正（FLAASH）和正射校正，为后续算法实验积累经验。
                            3. **黑臭水体特征提取初探**：基于预处理后的影像，利用 Python  编写脚本，初步复现了文献中的 BOI（黑臭水体指数）和 NDWI 指数。对先导区的水体进行了初步提取与掩膜，建立了第一批地物光谱样本库。`,
                issues: `1. **建筑阴影混淆严重**：在初步提取实验中发现，0.5米影像中“淀中村”密集的房屋阴影、树冠阴影在光谱反射率上与微小黑臭水体高度重合，仅靠 BOI 指数阈值分割会产生大量错分图斑（假阳性）。
                            2. **算法框架选择**：针对上述阴影剔除难题，目前正在犹豫是采用传统的面向对象分类（OBIA，结合形状/纹理特征），还是直接引入深度学习语义分割模型，需要进一步评估算力与时间成本。`,
                plan: `1. 针对阴影混淆问题，下周查阅并对比“基于多维特征的面向对象分类”与“深度学习水体提取”的相关代码开源情况，确定最终的核心算法框架。`
            }
        ];

        const dateListEl = document.getElementById('dateList');
        const reportCardEl = document.getElementById('reportCard');

        function initSidebar() {
            dateListEl.innerHTML = ''; 
            reportData.forEach((report, index) => {
                const li = document.createElement('li');
                li.className = 'date-item';
                li.textContent = report.date;
                li.onclick = () => {
                    document.querySelectorAll('.date-item').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');
                    renderReport(index);
                };
                dateListEl.appendChild(li);
            });
            
            if(reportData.length > 0) {
                dateListEl.firstChild.classList.add('active');
                renderReport(0);
            }
        }

        function renderReport(index) {
            const data = reportData[index];
            
            // 动画效果
            reportCardEl.classList.remove('animate-content');
            void reportCardEl.offsetWidth; 
            reportCardEl.classList.add('animate-content');

            // 处理文本：将 **文本** 转为 <b>文本</b>
            const formatText = (text) => {
                if (!text) return '暂无内容';
                return text.trim().replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            };

            reportCardEl.innerHTML = `
                <div class="report-header">
                    <h1>工作汇报：${data.date}</h1>
                    <div class="report-meta">汇报人：徐墨涵 | 遥感科学与技术</div>
                </div>
                
                <div class="section-title">工作总结</div>
                <div class="section-content">${formatText(data.summary)}</div>

                <div class="section-title">关键进展与结果</div>
                <div class="section-content">${formatText(data.progress)}</div>

                <div class="section-title">遇到的问题</div>
                <div class="section-content">${formatText(data.issues)}</div>

                <div class="section-title">下周计划</div>
                <div class="section-content">${formatText(data.plan)}</div>
            `;
        }

        document.addEventListener('DOMContentLoaded', initSidebar);
    </script>
</body>
</html>
