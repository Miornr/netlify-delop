<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科研周报系统 - 遥感科学与技术</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f5f7 0%, #eaeaec 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #0071e3;
            --accent-bg: rgba(0, 113, 227, 0.08); 
            --sidebar-hover: rgba(0, 0, 0, 0.04);
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d1d1d6;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a1a1a6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background: var(--bg-gradient);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .sidebar {
            width: 220px; 
            background-color: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-right: 1px solid rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            padding: 35px 20px 25px;
            text-align: center;
        }

        .sidebar-header h2 {
            margin: 0 0 6px 0;
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .sidebar-header p {
            margin: 0;
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .date-list {
            list-style: none;
            padding: 0 12px;
            margin: 0;
            overflow-y: auto;
        }

        .date-item {
            padding: 12px 16px;
            margin-bottom: 6px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
            font-size: 0.9rem;
            color: var(--text-primary);
            font-weight: 500;
            text-align: center; /* 核心修改：让文字居中 */
        }

        .date-item:hover {
            background-color: var(--sidebar-hover);
        }

        .date-item.active {
            background-color: var(--accent-bg);
            color: var(--accent-color);
            font-weight: 600;
        }

        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .report-card {
            background: var(--card-bg);
            padding: 50px 70px; 
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.8);
            max-width: 800px;
            margin: 0 auto 40px;
            min-height: calc(100% - 140px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-content {
            animation: fadeIn 0.4s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        .report-header {
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            padding-bottom: 24px;
            margin-bottom: 40px;
        }

        .report-header h1 {
            color: var(--text-primary);
            margin: 0 0 10px 0;
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .report-meta {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .section-title {
            color: var(--text-primary);
            font-size: 1.15rem;
            font-weight: 600;
            margin-top: 40px;
            margin-bottom: 18px;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
        }
        
        .section-title::before {
            content: "";
            display: inline-block;
            width: 4px;
            height: 16px;
            background-color: var(--accent-color);
            border-radius: 2px;
            margin-right: 12px;
        }

        .section-content {
            line-height: 1.8;
            color: #333336;
            background: #fcfcfd;
            padding: 24px 28px;
            border-radius: 14px;
            font-size: 0.98rem;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }
        
        .section-content b {
            color: #111;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>科研周报</h2>
            <p>遥感与信息工程学院</p>
        </div>
        <ul class="date-list" id="dateList">
            </ul>
    </aside>

    <main class="main-content">
        <div class="report-card" id="reportCard">
            </div>
    </main>

    <script>
        const reportData = [
            {
                date: '3/9--3/15     ',
                summary: '本周核心工作聚焦于商业遥感卫星（吉林一号 KF01/KF02 系列）影像质量的自动化评估。共完成39景影像（涵盖L3C及L1级）的批量处理与数据分析，严格对标《商业遥感卫星星座公益性服务项目评估方案》，重构了Python自动化评估脚本中的核心几何算法。',
                progress: '1. <b>平台性能对比与地形影响分析</b>：评估确认KF02系列幅宽稳定在15.2km以上，优于标准；分析发现沙漠区域L1级影像受低对比度或大气条件影响，分辨率略微超出0.5m阈值（0.504m-0.512m波动）。<br><br>2. <b>星下点分辨率校正</b>：成功实现基于XML元数据侧摆角的星下点投影校正，计算逻辑严格符合规范要求。<br><br>3. <b>幅宽算法重构</b>：针对L3C高级影像，引入背景值过滤，结合“海伦公式”及影像中轨多采样点（10%、50%、90%），精准测算真实垂轨距离，有效剔除了正射旋转产生的NoData黑边。<br><br>4. <b>评价指标边界厘清</b>：明确了像元有效分辨率（MTF）的评估必须基于L1原生数据，而非L3C（PSH融合）影像。',
                issues: '1. KF02系列影像在沙漠区域的分辨率偶尔超标，需进一步分析大气条件与地表特征对成像质量的影响。<br><br>',
                plan: '1. 继续优化自动化评估脚本<br><br>2. 深入分析KF02系列在不同地表条件下的成像表现，特别是沙漠区域，探索可能的校正方法以满足分辨率要求。<br><br>3. 准备下一阶段的评估工作，计划涵盖更多商业遥感卫星的数据，以验证算法的通用性和稳定性。'
            },
        ];

        const dateListEl = document.getElementById('dateList');
        const reportCardEl = document.getElementById('reportCard');

        function initSidebar() {
            dateListEl.innerHTML = ''; 
            reportData.forEach((report, index) => {
                const li = document.createElement('li');
                li.className = 'date-item';
                li.textContent = report.date;
                li.onclick = () => {
                    document.querySelectorAll('.date-item').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');
                    renderReport(index);
                };
                dateListEl.appendChild(li);
            });
            
            if(reportData.length > 0) {
                dateListEl.firstChild.classList.add('active');
                renderReport(0);
            }
        }

        function renderReport(index) {
            const data = reportData[index];
            
            reportCardEl.classList.remove('animate-content');
            void reportCardEl.offsetWidth; 
            reportCardEl.classList.add('animate-content');

            reportCardEl.innerHTML = `
                <div class="report-header">
                    <h1>工作汇报：${data.date}</h1>
                    <div class="report-meta">汇报人：徐墨涵 | 遥感科学与技术</div>
                </div>
                
                <div class="section-title">工作总结</div>
                <div class="section-content">${data.summary || '暂无内容'}</div>

                <div class="section-title">关键进展与结果</div>
                <div class="section-content">${data.progress || '暂无内容'}</div>

                <div class="section-title">遇到的问题</div>
                <div class="section-content">${data.issues || '暂无内容'}</div>

                <div class="section-title">下周计划</div>
                <div class="section-content">${data.plan || '暂无内容'}</div>
            `;
        }

        document.addEventListener('DOMContentLoaded', initSidebar);
    </script>
</body>
</html>
